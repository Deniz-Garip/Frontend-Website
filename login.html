<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #1a1d27;
        border: 1px solid #2d3148;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }

      .logo {
        text-align: center;
        font-size: 2rem;
        margin-bottom: 8px;
      }

      h1 {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .subtitle {
        text-align: center;
        color: #64748b;
        font-size: 0.9rem;
        margin-bottom: 32px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #94a3b8;
      }

      input {
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 8px;
        padding: 12px 14px;
        color: #e2e8f0;
        font-size: 0.95rem;
        outline: none;
        transition: border 0.2s;
        font-family: inherit;
        width: 100%;
      }

      input:focus {
        border-color: #7c6aff;
      }

      .password-wrapper {
        position: relative;
      }
      .password-wrapper input {
        padding-right: 44px;
      }

      .toggle-pw {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #64748b;
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0;
      }
      .toggle-pw:hover {
        color: #94a3b8;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.2s;
        margin-top: 8px;
      }

      .btn-primary {
        background: #7c6aff;
        color: white;
      }
      .btn-primary:hover {
        background: #6d59f0;
      }
      .btn-primary:disabled {
        background: #3d3460;
        color: #64748b;
        cursor: not-allowed;
      }

      .msg {
        margin-top: 16px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        text-align: center;
        display: none;
      }
      .msg.success {
        background: #22c55e20;
        color: #22c55e;
        border: 1px solid #22c55e40;
        display: block;
      }
      .msg.error {
        background: #ef444420;
        color: #ef4444;
        border: 1px solid #ef444440;
        display: block;
      }

      .signup-link {
        text-align: center;
        margin-top: 24px;
        font-size: 0.9rem;
        color: #64748b;
      }

      .signup-link a {
        color: #7c6aff;
        text-decoration: none;
        font-weight: 600;
      }

      .signup-link a:hover {
        text-decoration: underline;
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #ffffff40;
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">📦</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Login to manage your inventory</p>

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          oninput="clearMsg()"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            oninput="clearMsg()"
          />
          <button class="toggle-pw" onclick="togglePassword('password', this)">
            👁️
          </button>
        </div>
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="login()">
        Login
      </button>

      <div class="msg" id="msg"></div>

      <div class="signup-link">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>

    <script>
      const API = "https://new-website-production-9751.up.railway.app";

      // Show/hide password
      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "🙈";
        } else {
          input.type = "password";
          btn.textContent = "👁️";
        }
      }

      // Clear message
      function clearMsg() {
        const msg = document.getElementById("msg");
        msg.className = "msg";
        msg.textContent = "";
      }

      // Show message
      function showMsg(text, type) {
        const msg = document.getElementById("msg");
        msg.textContent = text;
        msg.className = "msg " + type;
      }

      // Login function
      async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");

        // Validation
        if (!email) {
          showMsg("Please enter your email.", "error");
          return;
        }
        if (!password) {
          showMsg("Please enter your password.", "error");
          return;
        }

        // Loading state
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Logging in...';

        try {
          const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ Email: email, Password: password }),
          });

          if (res.ok) {
            const data = await res.json();
            // Save account in browser
            localStorage.setItem("account", JSON.stringify(data.account));
            showMsg("✅ Login successful! Redirecting...", "success");
            // Redirect to dashboard
            setTimeout(() => {
              window.location.href = "index.html";
            }, 1500);
          } else {
            const err = await res.json();
            showMsg(err.detail || "Wrong email or password.", "error");
          }
        } catch {
          showMsg(
            "⚠️ Cannot connect to API. Make sure it is running.",
            "error",
          );
        }

        // Reset button
        btn.disabled = false;
        btn.innerHTML = "Login";
      }
    </script>
  </body>
</html>
