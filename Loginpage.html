<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #1a1d27;
        border: 1px solid #2d3148;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }

      .logo {
        text-align: center;
        font-size: 2rem;
        margin-bottom: 8px;
      }

      h1 {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .subtitle {
        text-align: center;
        color: #64748b;
        font-size: 0.9rem;
        margin-bottom: 32px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #94a3b8;
      }

      input {
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 8px;
        padding: 12px 14px;
        color: #e2e8f0;
        font-size: 0.95rem;
        outline: none;
        transition: border 0.2s;
        font-family: inherit;
        width: 100%;
      }

      input:focus {
        border-color: #7c6aff;
      }

      .password-wrapper {
        position: relative;
      }

      .password-wrapper input {
        padding-right: 44px;
      }

      .toggle-pw {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #64748b;
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0;
      }

      .toggle-pw:hover {
        color: #94a3b8;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.2s;
        margin-top: 8px;
      }

      .btn-primary {
        background: #7c6aff;
        color: white;
      }
      .btn-primary:hover {
        background: #6d59f0;
      }
      .btn-primary:disabled {
        background: #3d3460;
        color: #64748b;
        cursor: not-allowed;
      }

      .msg {
        margin-top: 16px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        text-align: center;
        display: none;
      }
      .msg.success {
        background: #22c55e20;
        color: #22c55e;
        border: 1px solid #22c55e40;
        display: block;
      }
      .msg.error {
        background: #ef444420;
        color: #ef4444;
        border: 1px solid #ef444440;
        display: block;
      }

      .login-link {
        text-align: center;
        margin-top: 24px;
        font-size: 0.9rem;
        color: #64748b;
      }

      .login-link a {
        color: #7c6aff;
        text-decoration: none;
        font-weight: 600;
      }

      .login-link a:hover {
        text-decoration: underline;
      }

      .strength-bar {
        height: 4px;
        border-radius: 2px;
        background: #2d3148;
        margin-top: 6px;
        overflow: hidden;
      }

      .strength-fill {
        height: 100%;
        border-radius: 2px;
        transition: all 0.3s;
        width: 0%;
      }

      .strength-text {
        font-size: 0.75rem;
        margin-top: 4px;
        color: #64748b;
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #ffffff40;
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">📦</div>
      <h1>Create Account</h1>
      <p class="subtitle">Sign up to manage your inventory</p>

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          oninput="clearMsg()"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            placeholder="Create a password"
            oninput="
              checkStrength();
              clearMsg();
            "
          />
          <button class="toggle-pw" onclick="togglePassword('password', this)">
            👁️
          </button>
        </div>
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrapper">
          <input
            type="text"
            id="confirmPassword"
            placeholder="Repeat your password"
            oninput="clearMsg()"
          />
        
        <button
          class="toggle-pw"
          onclick="togglePassword('confirmPassword', this)" > 👁️
        </button>
      </div>

      <div class="from-gruop">
        <label> Name </label>
        <input
          type="text"
          id="name"
          placeholder="Enter your name.Example Deniz"
        />
      </div>
      <div class="from-gruop">
        <label>Surname</label>
        <input type="text" id="surname" placeholder="Enter your surname" />
      </div>
      <div class="from-gruop">
        <label>Phone Number</label>
        <input
          type="text"
          id="phone_number"
          placeholder="Enter the phone number"
        />
      </div>

      <div class="from-group">
        <label>Address</label>
        <input type="text" id="address" placeholder="Enter your addresss" />
      </div>

      <button class="btn btn-primary" id="signupBtn" onclick="signUp()">
        Create Account
      </button>

      <div class="msg" id="msg"></div>

      <div class="login-link">
        Already have an account?
        <a href="https://deniz-garip.github.io/Frontend-Website/login.html"
          >Log in</a
        >
      </div>
      <div class="signup-link">
        Don't have an account?
        <a href="https://deniz-garip.github.io/Frontend-Website/loginpage.html"
          >Sign up</a
        >
      </div>
    </div>
    <script>
      const API = "http://127.0.0.1:8000";

      // Show/hide password
      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "🙈";
        } else {
          input.type = "password";
          btn.textContent = "👁️";
        }
      }

      // Password strength checker
      function checkStrength() {
        const pw = document.getElementById("password").value;
        const fill = document.getElementById("strengthFill");
        const text = document.getElementById("strengthText");

        let score = 0;
        if (pw.length >= 8) score++; // at least 8 characters
        if (/[A-Z]/.test(pw)) score++; // has uppercase
        if (/[0-9]/.test(pw)) score++; // has number
        if (/[^A-Za-z0-9]/.test(pw)) score++; // has special character

        const levels = [
          { width: "0%", color: "", label: "" },
          { width: "25%", color: "#ef4444", label: "Weak" },
          { width: "50%", color: "#f97316", label: "Fair" },
          { width: "75%", color: "#eab308", label: "Good" },
          { width: "100%", color: "#22c55e", label: "Strong" },
        ];

        fill.style.width = levels[score].width;
        fill.style.background = levels[score].color;
        text.textContent =
          pw.length > 0 ? `Password strength: ${levels[score].label}` : "";
        text.style.color = levels[score].color;
      }

      // Clear message
      function clearMsg() {
        const msg = document.getElementById("msg");
        msg.className = "msg";
        msg.textContent = "";
      }

      // Show message
      function showMsg(text, type) {
        const msg = document.getElementById("msg");
        msg.textContent = text;
        msg.className = "msg " + type;
      }

      // Sign up function
      async function signUp() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;
        const btn = document.getElementById("signupBtn");
        const Name = document.getElementById("name").value.trim();
        const Surname = document.getElementById("surname").value.trim();
        const Phone_Number = document
          .getElementById("phone_number")
          .value.trim();
        const Address = document.getElementById("address").value.trim();

        // Validation
        if (!email) {
          showMsg("Please enter your email.", "error");
          return;
        }
        if (!email.includes("@")) {
          showMsg("Please enter a valid email.", "error");
          return;
        }
        if (!password) {
          showMsg("Please enter a password.", "error");
          return;
        }
        if (password.length < 6) {
          showMsg("Password must be at least 6 characters.", "error");
          return;
        }
        if (password !== confirm) {
          showMsg("Passwords do not match.", "error");
          return;
        }

        if (Phone_Number.length >= 12) {
          showMsg("Phone Number length is maximum 12", "error");
          return;
        }
        if (!Phone_Number.includes("+44")) {
          showMsg("You didn't add your phone code (+44 or +90)", "error");
          return;
        }

        // Loading state
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Creating account...';

        try {
          const res = await fetch(`${API}/signup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              Email: email,
              Password: password,
              Name: Name,
              Surname: Surname,
              Phone_Number: Phone_Number,
              Address: Address,
            }),
          });

          if (res.ok) {
            showMsg(
              "✅ Account created successfully! Redirecting...",
              "success",
            );
            setTimeout(() => {
              window.location.href = "index.html"; // redirect to dashboard
            }, 2000);
          } else {
            const err = await res.json();
            showMsg(err.detail || "Signup failed. Try again.", "error");
          }
        } catch {
          showMsg(
            "⚠️ Cannot connect to API. Make sure it is running.",
            "error",
          );
        }

        // Reset button
        btn.disabled = false;
        btn.innerHTML = "Create Account";
      }
      async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const res = await fetch("http://127.0.0.1:8000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ Email: email, Password: password }),
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem("account", JSON.stringify(data.account));

          window.location.href = "index.html";
        } else {
          showMsg("Wrong Email or Password", " Error");
        }
      }
    </script>
  </body>
</html>
