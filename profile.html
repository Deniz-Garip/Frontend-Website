<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #1a1d27;
        border: 1px solid #2d3148;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }

      .logo {
        text-align: center;
        font-size: 2rem;
        margin-bottom: 8px;
      }

      h1 {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 24px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #94a3b8;
      }

      input {
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 8px;
        padding: 12px 14px;
        color: #e2e8f0;
        font-size: 0.95rem;
        outline: none;
        transition: border 0.2s;
        font-family: inherit;
        width: 100%;
      }

      input:focus {
        border-color: #7c6aff;
      }

      input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .password-wrapper {
        position: relative;
      }

      .password-wrapper input {
        padding-right: 44px;
      }

      .toggle-pw {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #64748b;
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0;
      }

      .toggle-pw:hover {
        color: #94a3b8;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.2s;
        margin-top: 8px;
      }

      .btn-primary {
        background: #7c6aff;
        color: white;
      }
      .btn-primary:hover {
        background: #6d59f0;
      }

      .btn-danger {
        background: #ef444420;
        color: #ef4444;
        border: 1px solid #ef444440;
      }
      .btn-danger:hover {
        background: #ef444430;
      }

      .msg {
        margin-top: 16px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        text-align: center;
        display: none;
      }
      .msg.success {
        background: #22c55e20;
        color: #22c55e;
        border: 1px solid #22c55e40;
        display: block;
      }
      .msg.error {
        background: #ef444420;
        color: #ef4444;
        border: 1px solid #ef444440;
        display: block;
      }

      .back-link {
        text-align: center;
        margin-top: 16px;
        font-size: 0.9rem;
        color: #64748b;
      }

      .back-link a {
        color: #7c6aff;
        text-decoration: none;
        font-weight: 600;
      }

      .back-link a:hover {
        text-decoration: underline;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">📦</div>
      <h1>My Profile</h1>

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" disabled placeholder="Your name" />
      </div>

      <div class="form-group">
        <label>Surname</label>
        <input type="text" id="surname" disabled placeholder="Your surname" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" disabled placeholder="Your email" />
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input
          type="text"
          id="phone_number"
          disabled
          placeholder="Your phone number"
        />
      </div>

      <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" disabled placeholder="Your address" />
      </div>

      <!-- Edit button → shown by default -->
      <button class="btn btn-primary" id="editBtn" onclick="Edit()">
        ✏️ Edit Profile
      </button>

      <!-- Save button → hidden by default -->
      <button
        class="btn btn-primary"
        id="saveBtn"
        onclick="Save()"
        style="display: none"
      >
        💾 Save Changes
      </button>

      <!-- Cancel button → hidden by default -->
      <button
        class="btn btn-danger"
        id="cancelBtn"
        onclick="Cancel()"
        style="display: none"
      >
        ❌ Cancel
      </button>

      <!-- Logout button → always shown -->
      <button
        class="btn btn-danger"
        onclick="logout()"
        style="margin-top: 16px"
      >
        🚪 Logout
      </button>

      <div class="msg" id="msg"></div>

      <div class="back-link">
        <a href="index.html">← Back to Dashboard</a>
      </div>
    </div>

    <script>
      const API = "https://new-website-production-9751.up.railway.app";

      // --- Check if logged in ---
      const account = JSON.parse(localStorage.getItem("account"));
      if (!account) {
        window.location.href = "login.html";
      }

      // --- Fill form with account data from localStorage ---
      document.getElementById("name").value = account.name || "";
      document.getElementById("surname").value = account.surname || "";
      document.getElementById("email").value = account.email || "";
      document.getElementById("phone_number").value =
        account.phone_number || "";
      document.getElementById("address").value = account.address || "";

      // --- Enable/disable inputs ---
      function setEditMode(isEditing) {
        const fields = ["name", "surname", "phone_number", "address"];
        fields.forEach((id) => {
          document.getElementById(id).disabled = !isEditing;
        });

        // email stays disabled always (can't change email)
        document.getElementById("email").disabled = true;

        document.getElementById("editBtn").style.display = isEditing
          ? "none"
          : "block";
        document.getElementById("saveBtn").style.display = isEditing
          ? "block"
          : "none";
        document.getElementById("cancelBtn").style.display = isEditing
          ? "block"
          : "none";
      }

      function Edit() {
        setEditMode(true);
        clearMsg();
      }

      function Cancel() {
        // Reset fields back to original values
        document.getElementById("name").value = account.name || "";
        document.getElementById("surname").value = account.surname || "";
        document.getElementById("phone_number").value =
          account.phone_number || "";
        document.getElementById("address").value = account.address || "";
        setEditMode(false);
        clearMsg();
      }

      // --- Save changes ---
      async function Save() {
        const saveBtn = document.getElementById("saveBtn");
        saveBtn.disabled = true;
        saveBtn.textContent = "Saving...";

        try {
          const res = await fetch(`${API}/account/${account.id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: document.getElementById("name").value,
              surname: document.getElementById("surname").value,
              address: document.getElementById("address").value,
              phone_number: document.getElementById("phone_number").value,
            }),
          });

          if (res.ok) {
            const data = await res.json();
            // Update localStorage with new info
            localStorage.setItem("account", JSON.stringify(data.account));
            showMsg("✅ Profile updated successfully!", "success");
            setEditMode(false);
          } else {
            showMsg("❌ Update failed. Try again.", "error");
          }
        } catch {
          showMsg("⚠️ Cannot connect to API.", "error");
        }

        saveBtn.disabled = false;
        saveBtn.textContent = "💾 Save Changes";
      }

      // --- Logout ---
      function logout() {
        localStorage.removeItem("account");
        window.location.href = "login.html";
      }

      // --- Message helpers ---
      function showMsg(text, type) {
        const msg = document.getElementById("msg");
        msg.textContent = text;
        msg.className = "msg " + type;
      }

      function clearMsg() {
        const msg = document.getElementById("msg");
        msg.textContent = "";
        msg.className = "msg";
      }
    </script>
  </body>
</html>
